<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostr Connection Test</title>
    <script src="https://unpkg.com/nostr-tools@2.19.4/lib/nostr-tools.bundle.js"></script>
    <script src="https://unpkg.com/@noble/secp256k1@3.0.0/index.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        #logs { background: #f8f9fa; padding: 10px; height: 300px; overflow-y: scroll; border: 1px solid #dee2e6; }
        .key-display { background: #f1f3f4; padding: 10px; margin: 10px 0; border-radius: 5px; font-family: monospace; word-break: break-all; }
    </style>
</head>
<body>
    <h1>Nostr Connection Test</h1>
    
    <div id="status" class="status info">Ready to test Nostr...</div>
    
    <div>
        <button onclick="testNostrConnection()">Test Nostr Connection</button>
        <button onclick="generateKeys()">Generate New Keys</button>
        <button onclick="publishTestNote()">Publish Test Note</button>
        <button onclick="subscribeToNotes()">Subscribe to Notes</button>
        <button onclick="clearLogs()">Clear Logs</button>
    </div>
    
    <div id="keyDisplay" class="key-display" style="display: none;">
        <h3>Your Nostr Keys:</h3>
        <div><strong>Public Key (npub):</strong> <span id="publicKey"></span></div>
        <div><strong>Private Key (nsec):</strong> <span id="privateKey"></span></div>
    </div>
    
    <div id="logs"></div>

    <script>
        let privateKey = null;
        let publicKey = null;
        let pool = null;
        let relays = [];
        
        // Default relays from your app (removed problematic ones)
        const defaultRelays = [
            'wss://relay.damus.io',
            'wss://nos.lol',
            'wss://relay.primal.net',
            'wss://relay.nostr.band',
            'wss://nostr.wine'
        ];
        
        function log(message, type = 'info') {
            const logs = document.getElementById('logs');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.innerHTML = `<strong>[${timestamp}]</strong> ${message}`;
            logEntry.style.color = type === 'error' ? '#721c24' : type === 'success' ? '#155724' : '#0c5460';
            logs.appendChild(logEntry);
            logs.scrollTop = logs.scrollHeight;
        }
        
        function updateStatus(message, type = 'info') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
        }
        
        async function generateKeys() {
            try {
                log('Generating new Nostr key pair...');
                
                // Generate private key
                const secretKey = new Uint8Array(32);
                crypto.getRandomValues(secretKey);
                privateKey = Array.from(secretKey).map(b => b.toString(16).padStart(2, '0')).join('');
                
                // Generate public key using secp256k1
                const privateKeyBytes = new Uint8Array(privateKey.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
                const publicKeyBytes = window.secp256k1.getPublicKey(privateKeyBytes);
                publicKey = Array.from(publicKeyBytes).map(b => b.toString(16).padStart(2, '0')).join('');
                
                // Display keys
                document.getElementById('publicKey').textContent = publicKey;
                document.getElementById('privateKey').textContent = privateKey;
                document.getElementById('keyDisplay').style.display = 'block';
                
                log('✅ Keys generated successfully', 'success');
                updateStatus('Keys generated', 'success');
                
            } catch (error) {
                log(`❌ Key generation failed: ${error.message}`, 'error');
            }
        }
        
        async function testNostrConnection() {
            try {
                if (!privateKey || !publicKey) {
                    await generateKeys();
                }
                
                log('Testing Nostr connection...');
                updateStatus('Connecting to relays...', 'info');
                
                // Initialize relay pool
                pool = window.NostrTools.SimplePool();
                let connectedCount = 0;
                
                // Connect to all relays
                for (const relayUrl of defaultRelays) {
                    try {
                        log(`Connecting to ${relayUrl}...`);
                        const relay = await Promise.race([
                            pool.ensureRelay(relayUrl),
                            new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), 5000))
                        ]);
                        
                        relays.push(relay);
                        connectedCount++;
                        log(`✅ Connected to ${relayUrl}`, 'success');
                        
                    } catch (error) {
                        log(`⚠️ Failed to connect to ${relayUrl}: ${error.message}`, 'error');
                    }
                }
                
                if (connectedCount > 0) {
                    log(`✅ Connected to ${connectedCount}/${defaultRelays.length} relays`, 'success');
                    updateStatus(`Connected to ${connectedCount} relays`, 'success');
                } else {
                    log('❌ Failed to connect to any relays', 'error');
                    updateStatus('No relay connections', 'error');
                }
                
            } catch (error) {
                log(`❌ Nostr connection test failed: ${error.message}`, 'error');
                updateStatus('Connection failed', 'error');
            }
        }
        
        async function publishTestNote() {
            if (!pool || relays.length === 0) {
                log('❌ Please test connection first', 'error');
                return;
            }
            
            try {
                log('Publishing test note...');
                
                const event = {
                    kind: 1, // Text note
                    pubkey: publicKey,
                    created_at: Math.floor(Date.now() / 1000),
                    tags: [],
                    content: `Test note from XitChat at ${new Date().toLocaleString()}`,
                    id: null,
                    sig: null
                };
                
                // Generate event ID
                event.id = window.NostrTools.getEventHash(event);
                
                // Sign event
                event.sig = await window.NostrTools.signEvent(event, privateKey);
                
                // Publish to relays
                const publishPromises = relays.map(relay => 
                    relay.publish(event).then(() => {
                        log(`✅ Published to ${relay.url}`, 'success');
                    }).catch(error => {
                        log(`❌ Failed to publish to ${relay.url}: ${error.message}`, 'error');
                    })
                );
                
                await Promise.all(publishPromises);
                log(`✅ Test note published: ${event.id}`, 'success');
                
            } catch (error) {
                log(`❌ Failed to publish note: ${error.message}`, 'error');
            }
        }
        
        async function subscribeToNotes() {
            if (!pool || relays.length === 0) {
                log('❌ Please test connection first', 'error');
                return;
            }
            
            try {
                log('Subscribing to global notes...');
                
                const filter = {
                    kinds: [1], // Text notes
                    limit: 10
                };
                
                // Subscribe to events
                const subscription = pool.subscribeMany(relays.map(r => r.url), [filter], {
                    onevent(event) {
                        log(`📨 Note received: ${event.content.substring(0, 100)}...`, 'success');
                    },
                    oneose() {
                        log('📋 End of stored events', 'info');
                    }
                });
                
                log('✅ Subscribed to global notes', 'success');
                
                // Auto-close after 30 seconds
                setTimeout(() => {
                    subscription.close();
                    log('📋 Subscription closed', 'info');
                }, 30000);
                
            } catch (error) {
                log(`❌ Failed to subscribe: ${error.message}`, 'error');
            }
        }
        
        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
            log('Logs cleared');
        }
        
        // Initialize
        window.addEventListener('load', () => {
            log('Nostr test page loaded. Ready to test connectivity.');
            updateStatus('Ready to test', 'info');
        });
    </script>
</body>
</html>
