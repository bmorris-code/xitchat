name: xitchat_mobile
description: XitChat mobile app with P2P mesh networking
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_webrtc: ^0.12.0
  shared_preferences: ^2.2.2
  permission_handler: ^11.0.1
  provider: ^6.1.1
  http: ^1.2.0
  socket_io_client: ^2.0.3+1
  flutter_blue_plus: ^1.31.15
  geolocator: ^10.1.0
  flutter_dotenv: ^5.1.0
  crypto: ^3.0.3
  uuid: ^4.2.1
  intl: ^0.19.0
  path_provider: ^2.1.1
  sqflite: ^2.3.0
  connectivity_plus: ^6.0.0
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.2.0
  image_picker: ^1.0.4
  file_picker: ^8.0.0
  web_socket_channel: ^2.4.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
