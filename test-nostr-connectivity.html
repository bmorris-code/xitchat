<!DOCTYPE html>
<html>
<head>
    <title>Nostr Connectivity Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Nostr Connectivity Test</h1>
    <div id="status"></div>
    
    <button onclick="testNostrConnection()">Test Nostr Connection</button>
    <button onclick="testNIP05()">Test NIP-05 Verification</button>
    <button onclick="clearLog()">Clear Log</button>
    
    <h3>Log:</h3>
    <pre id="log"></pre>

    <script type="module">
        import * as nostrTools from 'https://unpkg.com/nostr-tools@2.7.2/lib/nostr-tools.mjs';
        
        const statusDiv = document.getElementById('status');
        const logDiv = document.getElementById('log');
        
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            logDiv.textContent += `[${timestamp}] ${message}\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
            
            const statusClass = type === 'error' ? 'error' : type === 'success' ? 'success' : 'info';
            statusDiv.innerHTML = `<div class="status ${statusClass}">${message}</div>`;
        }
        
        window.testNostrConnection = async function() {
            log('🔑 Testing Nostr connection...');
            
            try {
                // Test with multiple relays
                const relays = [
                    'wss://relay.damus.io',
                    'wss://nos.lol', 
                    'wss://relay.primal.net',
                    'wss://nostr.wine',
                    'wss://relay.snort.social',
                    'wss://relay.nostr.band'
                ];
                
                const pool = new nostrTools.SimplePool();
                const connectedRelays = [];
                
                for (const relayUrl of relays) {
                    try {
                        log(`📡 Connecting to ${relayUrl}...`);
                        const relay = await Promise.race([
                            pool.ensureRelay(relayUrl),
                            new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), 5000))
                        ]);
                        
                        connectedRelays.push(relayUrl);
                        log(`✅ Connected to ${relayUrl}`, 'success');
                        
                        // Test a simple query
                        const events = await pool.querySync([relayUrl], { 
                            kinds: [1], 
                            limit: 1 
                        });
                        
                        log(`📨 Received ${events.length} events from ${relayUrl}`, 'success');
                        
                    } catch (error) {
                        log(`❌ Failed to connect to ${relayUrl}: ${error.message}`, 'error');
                    }
                }
                
                pool.close(relays);
                
                if (connectedRelays.length > 0) {
                    log(`🎉 Successfully connected to ${connectedRelays.length}/${relays.length} relays`, 'success');
                } else {
                    log('❌ Failed to connect to any relays', 'error');
                }
                
            } catch (error) {
                log(`❌ Nostr connection test failed: ${error.message}`, 'error');
            }
        };
        
        window.testNIP05 = async function() {
            log('🔍 Testing NIP-05 verification...');
            
            try {
                // Test with known valid NIP-05 addresses
                const testAddresses = [
                    { nip05: 'jack@jack.nostr.land', pubkey: '82341f882b6eabcd2ba7f1ef90aad96192c853710c53059aa48d0905ea571b0b' },
                    { nip05: 'fiatjaf@nostr.com', pubkey: '3bf0c63fcb93463407af97a5e5ee64fa883d107ef9e558472c4eb9aaaefa459d' }
                ];
                
                for (const test of testAddresses) {
                    log(`🔍 Verifying ${test.nip05}...`);
                    
                    const [localPart, domain] = test.nip05.split('@');
                    const wellKnownUrl = `https://${domain}/.well-known/nostr.json?name=${localPart}`;
                    
                    const response = await fetch(wellKnownUrl);
                    if (!response.ok) {
                        log(`❌ Failed to fetch ${wellKnownUrl}: ${response.status}`, 'error');
                        continue;
                    }
                    
                    const data = await response.json();
                    const verifiedPubkey = data.names?.[localPart];
                    
                    if (verifiedPubkey === test.pubkey) {
                        log(`✅ NIP-05 verified: ${test.nip05}`, 'success');
                    } else {
                        log(`❌ NIP-05 verification failed for ${test.nip05}`, 'error');
                        log(`   Expected: ${test.pubkey}`);
                        log(`   Got: ${verifiedPubkey}`);
                    }
                }
                
            } catch (error) {
                log(`❌ NIP-05 test failed: ${error.message}`, 'error');
            }
        };
        
        window.clearLog = function() {
            logDiv.textContent = '';
            statusDiv.innerHTML = '';
        };
        
        // Auto-run test on load
        setTimeout(() => {
            testNostrConnection();
        }, 1000);
    </script>
</body>
</html>
