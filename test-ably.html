<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ably WebRTC Test</title>
    <script src="https://cdn.ably.io/lib/ably.min-1.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        #logs { background: #f8f9fa; padding: 10px; height: 300px; overflow-y: scroll; border: 1px solid #dee2e6; }
    </style>
</head>
<body>
    <h1>Ably WebRTC Connection Test</h1>
    
    <div id="status" class="status info">Initializing...</div>
    
    <div>
        <button onclick="testAblyConnection()">Test Ably Connection</button>
        <button onclick="testWebRTC()">Test WebRTC Signaling</button>
        <button onclick="joinTestRoom()">Join Test Room</button>
        <button onclick="sendTestMessage()">Send Test Message</button>
        <button onclick="clearLogs()">Clear Logs</button>
    </div>
    
    <div id="logs"></div>

    <script>
        let ably = null;
        let channel = null;
        let testRoom = 'xitchat-test-room';
        
        function log(message, type = 'info') {
            const logs = document.getElementById('logs');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.innerHTML = `<strong>[${timestamp}]</strong> ${message}`;
            logEntry.style.color = type === 'error' ? '#721c24' : type === 'success' ? '#155724' : '#0c5460';
            logs.appendChild(logEntry);
            logs.scrollTop = logs.scrollHeight;
        }
        
        function updateStatus(message, type = 'info') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
        }
        
        async function testAblyConnection() {
            try {
                log('Testing Ably connection...');
                
                // Use the same API key from your app
                const apiKey = '0XyUmg.KAC1UQ:4HxrbKiaAWmzcMyMFiMWu74y3sHhA1KyZ3WBE2ixiSc';
                
                ably = new Ably.Realtime(apiKey);
                
                ably.connection.on('connected', () => {
                    log('✅ Ably connected successfully!', 'success');
                    updateStatus('Connected to Ably', 'success');
                });
                
                ably.connection.on('failed', (error) => {
                    log(`❌ Ably connection failed: ${error.message}`, 'error');
                    updateStatus('Ably connection failed', 'error');
                });
                
                ably.connection.on('disconnected', () => {
                    log('⚠️ Ably disconnected', 'error');
                    updateStatus('Disconnected from Ably', 'error');
                });
                
                // Wait for connection
                await new Promise((resolve, reject) => {
                    const timeout = setTimeout(() => reject(new Error('Connection timeout')), 10000);
                    ably.connection.on('connected', () => {
                        clearTimeout(timeout);
                        resolve();
                    });
                    ably.connection.on('failed', () => {
                        clearTimeout(timeout);
                        reject(new Error('Connection failed'));
                    });
                });
                
            } catch (error) {
                log(`❌ Ably test failed: ${error.message}`, 'error');
                updateStatus('Ably test failed', 'error');
            }
        }
        
        async function testWebRTC() {
            if (!ably) {
                log('❌ Please test Ably connection first', 'error');
                return;
            }
            
            try {
                log('Testing WebRTC signaling...');
                
                // Check WebRTC support
                if (!('RTCPeerConnection' in window)) {
                    log('❌ WebRTC not supported in this browser', 'error');
                    return;
                }
                
                log('✅ WebRTC is supported', 'success');
                
                // Create a test peer connection
                const pc = new RTCPeerConnection({
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' }
                    ]
                });
                
                pc.onicecandidate = (event) => {
                    if (event.candidate) {
                        log(`📍 ICE candidate found: ${event.candidate.candidate.substring(0, 50)}...`);
                    }
                };
                
                pc.onconnectionstatechange = () => {
                    log(`🔗 Connection state: ${pc.connectionState}`);
                };
                
                log('✅ WebRTC peer connection created', 'success');
                
            } catch (error) {
                log(`❌ WebRTC test failed: ${error.message}`, 'error');
            }
        }
        
        async function joinTestRoom() {
            if (!ably) {
                log('❌ Please test Ably connection first', 'error');
                return;
            }
            
            try {
                log(`Joining room: ${testRoom}`);
                
                channel = ably.channels.get(testRoom);
                
                // Subscribe to messages
                await channel.subscribe('test-message', (message) => {
                    log(`📨 Received message: ${message.data}`, 'success');
                });
                
                await channel.subscribe('signal', (message) => {
                    log(`📡 Received signal: ${JSON.stringify(message.data).substring(0, 100)}...`);
                });
                
                // Announce presence
                await channel.publish('peer-joined', {
                    peerId: `test-${Math.random().toString(36).substr(2, 9)}`,
                    timestamp: Date.now()
                });
                
                log('✅ Joined test room successfully', 'success');
                updateStatus('Connected to test room', 'success');
                
            } catch (error) {
                log(`❌ Failed to join room: ${error.message}`, 'error');
            }
        }
        
        async function sendTestMessage() {
            if (!channel) {
                log('❌ Please join test room first', 'error');
                return;
            }
            
            try {
                const message = {
                    text: `Test message from ${new Date().toLocaleTimeString()}`,
                    sender: 'test-client',
                    timestamp: Date.now()
                };
                
                await channel.publish('test-message', message);
                log(`📤 Sent message: ${message.text}`, 'success');
                
            } catch (error) {
                log(`❌ Failed to send message: ${error.message}`, 'error');
            }
        }
        
        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
            log('Logs cleared');
        }
        
        // Auto-start Ably connection test
        window.addEventListener('load', () => {
            log('Page loaded. Ready to test Ably WebRTC functionality.');
            updateStatus('Ready to test', 'info');
        });
    </script>
</body>
</html>
