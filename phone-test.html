<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone WebSocket Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Courier New', monospace; }
        .terminal { background: #000; color: #00ff41; }
        .glow { text-shadow: 0 0 10px #00ff41; }
    </style>
</head>
<body class="bg-black text-green-400 p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-bold mb-4 glow">📱 Phone WebSocket Test</h1>
        
        <div class="mb-4 p-3 border border-green-400/30">
            <h2 class="text-sm font-bold mb-2">Connection Status</h2>
            <div id="status" class="text-xs font-mono">Initializing...</div>
        </div>

        <div class="mb-4 p-3 border border-green-400/30">
            <h2 class="text-sm font-bold mb-2">Test Actions</h2>
            <div class="space-y-2">
                <button onclick="testHTTP()" class="w-full px-3 py-2 bg-green-400/20 border border-green-400 text-green-400 text-xs">
                    Test HTTP Connection
                </button>
                <button onclick="testWebSocket()" class="w-full px-3 py-2 bg-blue-400/20 border border-blue-400 text-blue-400 text-xs">
                    Test WebSocket
                </button>
                <button onclick="sendMessage()" class="w-full px-3 py-2 bg-cyan-400/20 border border-cyan-400 text-cyan-400 text-xs">
                    Send Test Message
                </button>
            </div>
        </div>

        <div class="mb-4 p-3 border border-green-400/30">
            <h2 class="text-sm font-bold mb-2">Message Log</h2>
            <div id="log" class="text-xs font-mono h-48 overflow-y-auto bg-black/50 p-2 border border-green-400/20"></div>
        </div>
    </div>

    <script>
        let ws = null;
        let connectionStatus = 'disconnected';

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const color = type === 'error' ? 'text-red-400' : type === 'success' ? 'text-green-400' : 'text-cyan-400';
            logDiv.innerHTML += `<div class="${color}">[${timestamp}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function updateStatus(status) {
            document.getElementById('status').innerHTML = status;
        }

        async function testHTTP() {
            log('🔍 Testing HTTP connection...', 'info');
            try {
                const response = await fetch('http://192.168.18.3:3001', {
                    method: 'GET',
                    mode: 'no-cors'
                });
                log('✅ HTTP connection successful', 'success');
                updateStatus('✅ HTTP Connected');
            } catch (error) {
                log(`❌ HTTP failed: ${error.message}`, 'error');
                updateStatus('❌ HTTP Failed');
            }
        }

        function testWebSocket() {
            log('🔍 Testing WebSocket...', 'info');
            
            // Close existing connection
            if (ws) {
                ws.close();
                ws = null;
            }

            // Try WebSocket connection
            try {
                ws = new WebSocket('ws://192.168.18.3:3001');
                
                ws.onopen = () => {
                    log('✅ WebSocket connected!', 'success');
                    connectionStatus = 'connected';
                    updateStatus('✅ WebSocket Connected');
                };

                ws.onmessage = (event) => {
                    log(`📨 Received: ${event.data}`, 'info');
                };

                ws.onerror = (error) => {
                    log(`❌ WebSocket error: ${error}`, 'error');
                    connectionStatus = 'error';
                    updateStatus('❌ WebSocket Error');
                };

                ws.onclose = (event) => {
                    log(`🔌 WebSocket closed: ${event.code}`, 'error');
                    connectionStatus = 'disconnected';
                    updateStatus('❌ WebSocket Disconnected');
                };

                // Connection timeout
                setTimeout(() => {
                    if (connectionStatus === 'disconnected') {
                        log('⏰ WebSocket connection timeout', 'error');
                        updateStatus('⏰ Connection Timeout');
                        if (ws) ws.close();
                    }
                }, 5000);

            } catch (error) {
                log(`❌ WebSocket creation failed: ${error.message}`, 'error');
                updateStatus('❌ WebSocket Failed');
            }
        }

        function sendMessage() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('❌ WebSocket not connected', 'error');
                return;
            }

            const message = `Test from H60 at ${new Date().toLocaleTimeString()}`;
            ws.send(message);
            log(`📤 Sent: ${message}`, 'success');
        }

        // Auto-start tests
        window.addEventListener('load', () => {
            log('🚀 Phone WebSocket Test Started', 'success');
            updateStatus('📱 Ready for Testing');
            
            // Auto-test HTTP first
            setTimeout(testHTTP, 1000);
            
            // Auto-test WebSocket after HTTP
            setTimeout(testWebSocket, 2000);
        });

        // Monitor connection
        setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                updateStatus('✅ WebSocket Connected');
            } else if (connectionStatus !== 'error') {
                updateStatus('❌ WebSocket Disconnected');
            }
        }, 1000);
    </script>
</body>
</html>
