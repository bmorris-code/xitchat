<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xitchat Chat Test</title>
    <style>
        body { font-family: monospace; background: #000; color: #00ff41; padding: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #004400; }
        .pass { color: #00ff41; }
        .fail { color: #ff4141; }
        .info { color: #41a5ff; }
        button { background: #004400; color: #00ff41; border: 1px solid #00ff41; padding: 10px; margin: 5px; cursor: pointer; }
        button:hover { background: #006600; }
        #results { max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body>
    <h1>Xitchat Chat Functionality Test</h1>
    
    <div class="test-section">
        <h2>🧪 Test Controls</h2>
        <button onclick="runAllTests()">Run All Tests</button>
        <button onclick="testBasicMessaging()">Test Basic Messaging</button>
        <button onclick="testHybridMesh()">Test Hybrid Mesh</button>
        <button onclick="testNostrConnection()">Test Nostr</button>
        <button onclick="testBluetooth()">Test Bluetooth</button>
        <button onclick="clearResults()">Clear Results</button>
    </div>

    <div class="test-section">
        <h2>📊 Test Results</h2>
        <div id="results"></div>
    </div>

    <script>
        let testResults = [];

        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const result = { timestamp, message, type };
            testResults.push(result);
            updateDisplay();
        }

        function updateDisplay() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = testResults.map(r => 
                `<div class="${r.type}">[${r.timestamp}] ${r.message}</div>`
            ).join('');
            resultsDiv.scrollTop = resultsDiv.scrollHeight;
        }

        function clearResults() {
            testResults = [];
            updateDisplay();
        }

        async function testBasicMessaging() {
            log('🔍 Testing Basic Messaging...', 'info');
            
            try {
                // Test if we can access the main app window
                const appWindow = window.open('http://localhost:3000', 'xitchat-app');
                if (!appWindow) {
                    log('❌ Cannot open app window - popup blocker?', 'fail');
                    return;
                }
                
                // Wait for app to load
                await new Promise(resolve => setTimeout(resolve, 3000));
                
                log('✅ App window opened successfully', 'pass');
                log('📝 Manual test: Try sending a message in the app', 'info');
                log('📝 Manual test: Check if message appears in chat', 'info');
                
                // Close after test
                setTimeout(() => appWindow.close(), 10000);
                
            } catch (error) {
                log(`❌ Basic messaging test failed: ${error.message}`, 'fail');
            }
        }

        async function testHybridMesh() {
            log('🔍 Testing Hybrid Mesh Service...', 'info');
            
            try {
                // Check if hybrid mesh service is available
                const response = await fetch('http://localhost:3000');
                if (response.ok) {
                    log('✅ Development server is running', 'pass');
                    log('📝 Check browser console for hybrid mesh initialization logs', 'info');
                } else {
                    log('❌ Development server not responding', 'fail');
                }
            } catch (error) {
                log(`❌ Hybrid mesh test failed: ${error.message}`, 'fail');
            }
        }

        async function testNostrConnection() {
            log('🔍 Testing Nostr Service...', 'info');
            
            try {
                // This would require checking the app's nostr service
                log('📝 Manual test: Look for nostr connection status in app', 'info');
                log('📝 Manual test: Try sending a message via Nostr', 'info');
                log('📝 Check browser console for nostr logs', 'info');
            } catch (error) {
                log(`❌ Nostr test failed: ${error.message}`, 'fail');
            }
        }

        async function testBluetooth() {
            log('🔍 Testing Bluetooth...', 'info');
            
            if (!('bluetooth' in navigator)) {
                log('⚠️ Bluetooth not available in this browser', 'fail');
                return;
            }
            
            try {
                log('✅ Bluetooth API available', 'pass');
                log('📝 Manual test: Try connecting to Bluetooth devices in app', 'info');
                log('📝 Check browser permissions for Bluetooth', 'info');
            } catch (error) {
                log(`❌ Bluetooth test failed: ${error.message}`, 'fail');
            }
        }

        async function runAllTests() {
            log('🚀 Running all chat functionality tests...', 'info');
            clearResults();
            
            await testBasicMessaging();
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            await testHybridMesh();
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            await testNostrConnection();
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            await testBluetooth();
            
            log('✅ All tests completed - check results above', 'pass');
        }

        // Auto-run on load
        window.onload = () => {
            log('🎯 Xitchat Chat Test Suite Ready', 'info');
            log('📱 Open the browser preview to test the actual app', 'info');
        };
    </script>
</body>
</html>
