<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Round background with gradient -->
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>
    
    <linearGradient id="xGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff41"/>
      <stop offset="50%" style="stop-color:#00cc33"/>
      <stop offset="100%" style="stop-color:#00ff41"/>
    </linearGradient>
    
    <filter id="xGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00ff41" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Round background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGradient)"/>
  
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#00ff41" stroke-width="2" opacity="0.2"/>
  
  <!-- Large X shape -->
  <g transform="translate(256, 256)" filter="url(#xGlow)">
    <!-- Main X paths - much bigger and bolder -->
    <path d="M -140,-140 L 140,140 M 140,-140 L -140,140" 
          stroke="url(#xGradient)" 
          stroke-width="24" 
          stroke-linecap="round"
          opacity="0.9"/>
    
    <!-- Inner highlight for depth -->
    <path d="M -120,-120 L 120,120 M 120,-120 L -120,120" 
          stroke="#00ff41" 
          stroke-width="4" 
          stroke-linecap="round"
          opacity="0.6"/>
  </g>
  
  <!-- Center accent -->
  <circle cx="256" cy="256" r="12" fill="#00ff41" opacity="0.8" filter="url(#shadow)"/>
  
  <!-- Corner accents for modern look -->
  <g opacity="0.3">
    <circle cx="100" cy="100" r="4" fill="#00ff41"/>
    <circle cx="412" cy="100" r="4" fill="#00ff41"/>
    <circle cx="100" cy="412" r="4" fill="#00ff41"/>
    <circle cx="412" cy="412" r="4" fill="#00ff41"/>
  </g>
</svg>
