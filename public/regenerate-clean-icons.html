<!DOCTYPE html>
<html>
<head>
    <title>XitChat Clean Icon Generator</title>
    <style>
        body { font-family: monospace; background: #000; color: #00ff41; padding: 20px; }
        .icon { margin: 10px; display: inline-block; text-align: center; }
        canvas { border: 1px solid #00ff41; }
        button { background: #00ff41; color: #000; border: none; padding: 10px; margin: 5px; cursor: pointer; }
        .old { opacity: 0.5; }
    </style>
</head>
<body>
    <h1>XitChat Clean Icon Generator</h1>
    <p><strong>Removed text for cleaner iPhone home screen icons</strong></p>
    <div id="icons"></div>

    <script>
        const svg = `<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#000000"/>
  <g transform="translate(256, 256)">
    <circle cx="0" cy="0" r="120" fill="none" stroke="#00ff41" stroke-width="4" opacity="0.3"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#00ff41" stroke-width="2" opacity="0.5"/>
    <path d="M -60,-60 L 60,60 M 60,-60 L -60,60" 
          stroke="#00ff41" 
          stroke-width="12" 
          stroke-linecap="round"/>
    <circle cx="0" cy="0" r="8" fill="#00ff41"/>
  </g>
</svg>`;
        
        const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
        
        function createIcon(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            const img = new Image();
            img.onload = function() {
                ctx.drawImage(img, 0, 0, size, size);
                
                const downloadBtn = document.createElement('button');
                downloadBtn.textContent = `Download icon-${size}.png (Clean)`;
                downloadBtn.onclick = function() {
                    const link = document.createElement('a');
                    link.download = `icon-${size}.png`;
                    link.href = canvas.toDataURL();
                    link.click();
                };
                
                const div = document.createElement('div');
                div.className = 'icon';
                div.appendChild(canvas);
                div.appendChild(document.createElement('br'));
                div.appendChild(downloadBtn);
                document.getElementById('icons').appendChild(div);
            };
            img.src = 'data:image/svg+xml;base64,' + btoa(svg);
        }
        
        sizes.forEach(size => createIcon(size));
    </script>
</body>
</html>
