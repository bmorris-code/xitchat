<!DOCTYPE html>
<html>
<head>
    <title>NIP-04 Encryption Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>NIP-04 Encryption/Decryption Test</h1>
    <div id="status"></div>
    
    <button onclick="testNIP04()">Test NIP-04</button>
    <button onclick="clearLog()">Clear Log</button>
    
    <h3>Log:</h3>
    <pre id="log"></pre>

    <script type="module">
        import * as nostrTools from 'https://unpkg.com/nostr-tools@2.7.2/lib/nostr-tools.mjs';
        import * as secp256k1 from 'https://unpkg.com/@noble/secp256k1@1.7.1/lib/index.js';
        
        const statusDiv = document.getElementById('status');
        const logDiv = document.getElementById('log');
        
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            logDiv.textContent += `[${timestamp}] ${message}\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
            
            const statusClass = type === 'error' ? 'error' : type === 'success' ? 'success' : 'info';
            statusDiv.innerHTML = `<div class="status ${statusClass}">${message}</div>`;
        }
        
        window.testNIP04 = async function() {
            log('🔑 Testing NIP-04 encryption/decryption...');
            
            try {
                // Generate test keys
                const privateKey = secp256k1.utils.bytesToHex(secp256k1.utils.randomPrivateKey());
                const publicKey = secp256k1.utils.bytesToHex(secp256k1.getPublicKey(privateKey));
                
                log(`🔐 Generated test key pair`);
                log(`   Private: ${privateKey.slice(0, 16)}...`);
                log(`   Public:  ${publicKey.slice(0, 16)}...`);
                
                // Test message
                const testMessage = 'Hello, this is a NIP-04 encrypted message!';
                log(`📝 Original message: "${testMessage}"`);
                
                // Encrypt
                const encrypted = await nostrTools.nip04.encrypt(privateKey, publicKey, testMessage);
                log(`🔒 Encrypted: ${encrypted.slice(0, 50)}...`);
                
                // Decrypt
                const decrypted = await nostrTools.nip04.decrypt(privateKey, publicKey, encrypted);
                log(`🔓 Decrypted: "${decrypted}"`);
                
                // Verify
                if (decrypted === testMessage) {
                    log('✅ NIP-04 test PASSED - encryption/decryption working correctly!', 'success');
                } else {
                    log('❌ NIP-04 test FAILED - messages do not match!', 'error');
                }
                
                // Test with different keys (sender/receiver)
                log('\n🔄 Testing with different keys...');
                const receiverPrivateKey = secp256k1.utils.bytesToHex(secp256k1.utils.randomPrivateKey());
                const receiverPublicKey = secp256k1.utils.bytesToHex(secp256k1.getPublicKey(receiverPrivateKey));
                
                const crossEncrypted = await nostrTools.nip04.encrypt(privateKey, receiverPublicKey, testMessage);
                const crossDecrypted = await nostrTools.nip04.decrypt(receiverPrivateKey, publicKey, crossEncrypted);
                
                if (crossDecrypted === testMessage) {
                    log('✅ Cross-key NIP-04 test PASSED!', 'success');
                } else {
                    log('❌ Cross-key NIP-04 test FAILED!', 'error');
                }
                
            } catch (error) {
                log(`❌ NIP-04 test failed: ${error.message}`, 'error');
                console.error('NIP-04 test error:', error);
            }
        };
        
        window.clearLog = function() {
            logDiv.textContent = '';
            statusDiv.innerHTML = '';
        };
        
        // Auto-run test on load
        setTimeout(() => {
            testNIP04();
        }, 1000);
    </script>
</body>
</html>
