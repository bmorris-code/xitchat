<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XitChat Mesh Connectivity Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .info { background-color: #d1ecf1; color: #0c5460; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; }
        #log { background: #f5f5f5; padding: 10px; height: 200px; overflow-y: scroll; font-family: monospace; }
    </style>
</head>
<body>
    <h1>XitChat Mesh Connectivity Test</h1>
    
    <div class="test-section">
        <h2>Platform Detection</h2>
        <div id="platform-info"></div>
    </div>

    <div class="test-section">
        <h2>Bluetooth Support (Android/Chrome)</h2>
        <button onclick="testBluetooth()">Test Bluetooth</button>
        <div id="bluetooth-status"></div>
    </div>

    <div class="test-section">
        <h2>WebRTC Support (iOS Safari/All)</h2>
        <button onclick="testWebRTC()">Test WebRTC</button>
        <div id="webrtc-status"></div>
    </div>

    <div class="test-section">
        <h2>Signaling Server Connection</h2>
        <input type="text" id="signaling-url" placeholder="wss://your-server.com" style="width: 300px;">
        <button onclick="testSignaling()">Test Connection</button>
        <div id="signaling-status"></div>
    </div>

    <div class="test-section">
        <h2>Test Log</h2>
        <div id="log"></div>
        <button onclick="clearLog()">Clear Log</button>
    </div>

    <script>
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `<div class="${type}">[${timestamp}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function showStatus(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.innerHTML = `<div class="status ${type}">${message}</div>`;
        }

        // Platform Detection
        function detectPlatform() {
            const userAgent = navigator.userAgent;
            const platform = navigator.platform;
            
            let isAndroid = /Android/i.test(userAgent);
            let isIOS = /iPhone|iPad|iPod/i.test(userAgent);
            let isSafari = /Safari/i.test(userAgent) && !/Chrome/i.test(userAgent);
            let isChrome = /Chrome/i.test(userAgent);
            
            const info = `
                <strong>Platform:</strong> ${platform}<br>
                <strong>User Agent:</strong> ${userAgent}<br>
                <strong>Android:</strong> ${isAndroid}<br>
                <strong>iOS:</strong> ${isIOS}<br>
                <strong>Safari:</strong> ${isSafari}<br>
                <strong>Chrome:</strong> ${isChrome}<br>
                <strong>HTTPS:</strong> ${location.protocol === 'https:'}<br>
                <strong>Recommended Method:</strong> ${isAndroid ? 'Bluetooth' : isIOS ? 'WebRTC' : 'WebRTC'}
            `;
            
            document.getElementById('platform-info').innerHTML = info;
            log(`Platform detected: ${isAndroid ? 'Android' : isIOS ? 'iOS' : 'Desktop'}`);
        }

        // Bluetooth Test
        async function testBluetooth() {
            log('Testing Bluetooth support...');
            
            if (!('bluetooth' in navigator)) {
                showStatus('bluetooth-status', '❌ Web Bluetooth API not supported', 'error');
                log('Web Bluetooth API not available', 'error');
                return;
            }

            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['generic_access']
                });
                
                showStatus('bluetooth-status', `✅ Bluetooth device found: ${device.name}`, 'success');
                log(`Bluetooth device connected: ${device.name}`, 'success');
            } catch (error) {
                showStatus('bluetooth-status', `❌ Bluetooth test failed: ${error.message}`, 'error');
                log(`Bluetooth error: ${error.message}`, 'error');
            }
        }

        // WebRTC Test
        async function testWebRTC() {
            log('Testing WebRTC support...');
            
            if (!('RTCPeerConnection' in window)) {
                showStatus('webrtc-status', '❌ WebRTC not supported', 'error');
                log('WebRTC not available', 'error');
                return;
            }

            try {
                const pc = new RTCPeerConnection({
                    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                });

                const dataChannel = pc.createDataChannel('test');
                
                pc.onicecandidate = (event) => {
                    if (event.candidate) {
                        log('ICE candidate generated', 'success');
                    }
                };

                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                
                showStatus('webrtc-status', '✅ WebRTC support confirmed', 'success');
                log('WebRTC peer connection created successfully', 'success');
                
                // Cleanup
                pc.close();
            } catch (error) {
                showStatus('webrtc-status', `❌ WebRTC test failed: ${error.message}`, 'error');
                log(`WebRTC error: ${error.message}`, 'error');
            }
        }

        // Signaling Server Test
        async function testSignaling() {
            const url = document.getElementById('signaling-url').value || 'wss://your-websocket-server.railway.app';
            log(`Testing signaling server: ${url}`);
            
            try {
                const ws = new WebSocket(url);
                
                ws.onopen = () => {
                    showStatus('signaling-status', '✅ Connected to signaling server', 'success');
                    log('WebSocket connection established', 'success');
                    
                    // Test message
                    ws.send(JSON.stringify({ type: 'test', timestamp: Date.now() }));
                };
                
                ws.onmessage = (event) => {
                    log(`Received: ${event.data}`, 'success');
                    ws.close();
                };
                
                ws.onerror = (error) => {
                    showStatus('signaling-status', `❌ WebSocket error: ${error}`, 'error');
                    log(`WebSocket error: ${error}`, 'error');
                };
                
                ws.onclose = () => {
                    log('WebSocket connection closed');
                };
                
                // Timeout
                setTimeout(() => {
                    if (ws.readyState === WebSocket.CONNECTING) {
                        showStatus('signaling-status', '❌ Connection timeout', 'error');
                        log('WebSocket connection timeout', 'error');
                        ws.close();
                    }
                }, 5000);
                
            } catch (error) {
                showStatus('signaling-status', `❌ Signaling test failed: ${error.message}`, 'error');
                log(`Signaling error: ${error.message}`, 'error');
            }
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        // Initialize on load
        window.onload = () => {
            detectPlatform();
            log('Mesh connectivity test loaded');
        };
    </script>
</body>
</html>
