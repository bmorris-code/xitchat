<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XitChat Discovery Test</title>
    <style>
        body {
            font-family: monospace;
            background: #000;
            color: #0f0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .status {
            background: #111;
            border: 1px solid #0f0;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .peer {
            background: #0a0a0a;
            border: 1px solid #0f0;
            padding: 10px;
            margin: 5px 0;
            border-radius: 3px;
        }
        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #0c0;
        }
        .log {
            background: #111;
            border: 1px solid #666;
            padding: 10px;
            margin: 10px 0;
            height: 200px;
            overflow-y: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 XitChat Discovery Test</h1>
        
        <div class="status" id="status">
            Initializing discovery service...
        </div>

        <div>
            <button onclick="startDiscovery()">🔍 Start Discovery</button>
            <button onclick="stopDiscovery()">⏹️ Stop Discovery</button>
            <button onclick="addManualPeer()">➕ Add Manual Peer</button>
            <button onclick="clearLog()">🗑️ Clear Log</button>
        </div>

        <div>
            <h3>Discovered Peers:</h3>
            <div id="peers"></div>
        </div>

        <div class="log" id="log"></div>
    </div>

    <script>
        // Simple discovery test implementation
        let peers = new Map();
        let isScanning = false;
        let broadcastChannel = null;
        let scanInterval = null;

        function log(message) {
            const logEl = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logEl.innerHTML += `[${timestamp}] ${message}\n`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        function updateStatus(message) {
            document.getElementById('status').textContent = message;
        }

        function updatePeersList() {
            const peersEl = document.getElementById('peers');
            peersEl.innerHTML = '';
            
            if (peers.size === 0) {
                peersEl.innerHTML = '<div class="peer">No peers discovered yet</div>';
                return;
            }

            peers.forEach((peer, id) => {
                const peerEl = document.createElement('div');
                peerEl.className = 'peer';
                peerEl.innerHTML = `
                    <strong>${peer.name}</strong> (${peer.handle})<br>
                    Method: ${peer.discoveryMethod} | 
                    Connected: ${peer.isConnected ? '✅' : '❌'} | 
                    Last seen: ${new Date(peer.lastSeen).toLocaleTimeString()}
                `;
                peerEl.onclick = () => connectToPeer(id);
                peersEl.appendChild(peerEl);
            });
        }

        function generatePeerId() {
            return 'test-' + Math.random().toString(36).substr(2, 9);
        }

        function getMyInfo() {
            return {
                id: generatePeerId(),
                name: 'Test User',
                handle: '@test' + Math.random().toString(36).substr(2, 5),
                timestamp: Date.now()
            };
        }

        function startDiscovery() {
            if (isScanning) {
                log('Discovery already running');
                return;
            }

            isScanning = true;
            updateStatus('🔍 Scanning for peers...');
            log('Starting peer discovery...');

            // Initialize broadcast channel for local network discovery
            try {
                broadcastChannel = new BroadcastChannel('xitchat-discovery');
                
                const myInfo = getMyInfo();
                
                // Listen for other peers
                broadcastChannel.onmessage = (event) => {
                    if (event.data.type === 'peer-announcement') {
                        handleDiscoveredPeer({
                            id: event.data.id,
                            name: event.data.name,
                            handle: event.data.handle,
                            discoveryMethod: 'local-network',
                            isConnected: false,
                            lastSeen: event.data.timestamp
                        });
                    }
                };

                // Announce our presence
                broadcastChannel.postMessage({
                    type: 'peer-announcement',
                    ...myInfo
                });

                // Periodic announcements
                scanInterval = setInterval(() => {
                    broadcastChannel.postMessage({
                        type: 'peer-announcement',
                        ...myInfo,
                        timestamp: Date.now()
                    });
                }, 10000);

                log('Local network discovery started');
                log(`My peer ID: ${myInfo.id}`);
                
            } catch (error) {
                log('BroadcastChannel not available, falling back to simulation');
                startSimulation();
            }
        }

        function startSimulation() {
            // Simulate discovering peers for testing
            setTimeout(() => {
                handleDiscoveredPeer({
                    id: 'sim-peer-1',
                    name: 'Simulated Peer 1',
                    handle: '@sim1',
                    discoveryMethod: 'simulation',
                    isConnected: false,
                    lastSeen: Date.now()
                });
            }, 2000);

            setTimeout(() => {
                handleDiscoveredPeer({
                    id: 'sim-peer-2',
                    name: 'Simulated Peer 2',
                    handle: '@sim2',
                    discoveryMethod: 'simulation',
                    isConnected: false,
                    lastSeen: Date.now()
                });
            }, 4000);
        }

        function stopDiscovery() {
            isScanning = false;
            updateStatus('⏹️ Discovery stopped');
            
            if (broadcastChannel) {
                broadcastChannel.close();
                broadcastChannel = null;
            }
            
            if (scanInterval) {
                clearInterval(scanInterval);
                scanInterval = null;
            }
            
            log('Discovery stopped');
        }

        function handleDiscoveredPeer(peer) {
            peers.set(peer.id, peer);
            log(`👤 Discovered peer: ${peer.name} (${peer.handle}) via ${peer.discoveryMethod}`);
            updatePeersList();
        }

        function connectToPeer(peerId) {
            const peer = peers.get(peerId);
            if (!peer) {
                log('Peer not found: ' + peerId);
                return;
            }

            log(`🔗 Connecting to ${peer.name}...`);
            
            // Simulate connection
            setTimeout(() => {
                peer.isConnected = true;
                peer.lastSeen = Date.now();
                log(`✅ Connected to ${peer.name}`);
                updatePeersList();
            }, 1000);
        }

        function addManualPeer() {
            const name = prompt('Enter peer name:');
            const id = prompt('Enter peer ID:');
            
            if (name && id) {
                handleDiscoveredPeer({
                    id: id,
                    name: name,
                    handle: '@' + name.toLowerCase().replace(/\s+/g, ''),
                    discoveryMethod: 'manual',
                    isConnected: false,
                    lastSeen: Date.now()
                });
            }
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        // Initialize
        updateStatus('Ready to start discovery');
        updatePeersList();
        log('Discovery test page loaded');
        
        // Auto-start discovery after 1 second
        setTimeout(() => {
            log('Auto-starting discovery for testing...');
            startDiscovery();
        }, 1000);
    </script>
</body>
</html>
