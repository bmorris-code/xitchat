<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groq AI Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        #logs { background: #f8f9fa; padding: 10px; height: 300px; overflow-y: scroll; border: 1px solid #dee2e6; }
        .response { background: #f1f3f4; padding: 10px; margin: 10px 0; border-radius: 5px; white-space: pre-wrap; }
        input[type="text"] { width: 300px; padding: 8px; margin: 5px; }
        .provider-status { display: flex; gap: 20px; margin: 10px 0; }
        .provider { padding: 10px; border-radius: 5px; border: 2px solid #dee2e6; }
        .provider.active { border-color: #28a745; background: #d4edda; }
        .provider.inactive { border-color: #dc3545; background: #f8d7da; }
    </style>
</head>
<body>
    <h1>Groq AI Test for XitChat</h1>
    
    <div id="status" class="status info">Ready to test Groq AI...</div>
    
    <div class="provider-status">
        <div id="groq-status" class="provider">
            <h3>🚀 Groq AI</h3>
            <div>Status: <span id="groq-health">Checking...</span></div>
            <div>Speed: Ultra-fast</div>
            <div>Limit: 100/day</div>
        </div>
        <div id="gemini-status" class="provider">
            <h3>💎 Gemini AI</h3>
            <div>Status: <span id="gemini-health">Checking...</span></div>
            <div>Speed: Medium</div>
            <div>Limit: 20/day</div>
        </div>
    </div>
    
    <div>
        <input type="text" id="messageInput" placeholder="Type a message for XitBot..." value="Hello! How does the mesh network work?">
        <button onclick="testChatResponse()">Test Chat Response</button>
        <button onclick="testQuickReplies()">Test Quick Replies</button>
        <button onclick="testBuzzFeed()">Test Buzz Feed</button>
        <button onclick="testHybridSwitch()">Test Provider Switch</button>
        <button onclick="clearLogs()">Clear Logs</button>
    </div>
    
    <div id="response" class="response" style="display: none;"></div>
    
    <div id="logs"></div>

    <script>
        // Mock implementation for testing (in real app, this would import from services)
        class MockHybridAI {
            constructor() {
                this.primaryProvider = 'groq';
                this.isGroqHealthy = true;
                this.failureCount = 0;
            }

            async testGroqHealth() {
                // Simulate API call
                return new Promise((resolve) => {
                    setTimeout(() => {
                        // Simulate 90% success rate
                        resolve(Math.random() > 0.1);
                    }, 500);
                });
            }

            async getXitBotResponse(message) {
                const provider = this.primaryProvider;
                const responses = {
                    groq: `🚀 Groq Response: "${message}" - That's a rad question about mesh networks! Mesh networking creates a decentralized web where each device acts as both client and router. It's like having your own private internet that works even when the main connection goes down. Tubular, right? ⚡`,
                    gemini: `💎 Gemini Response: "${message}" - Mesh networks are fascinating decentralized systems where each node can communicate directly with others without relying on a central server. This creates a resilient communication web that can self-heal and adapt to changing conditions.`
                };
                
                return responses[provider] || responses.groq;
            }

            async getQuickReplies(lastMessage) {
                return ["Rad!", "Mesh it!", "On it!", "10-4", "No prob"];
            }

            async getLatestBuzz() {
                return [
                    { title: "Groq Speed Records", time: "Now", snippet: "AI responses hitting lightning speeds with new optimization", category: "NEWS" },
                    { title: "Mesh Node Discovery", time: "5m ago", snippet: "New peers detected in your area", category: "UPDATE" }
                ];
            }

            getProviderStatus() {
                return {
                    primary: this.primaryProvider,
                    groqHealthy: this.isGroqHealthy,
                    failureCount: this.failureCount
                };
            }

            forceSwitchProvider(provider) {
                this.primaryProvider = provider;
                this.isGroqHealthy = (provider === 'groq');
                this.updateProviderDisplay();
            }

            updateProviderDisplay() {
                const groqStatus = document.getElementById('groq-status');
                const geminiStatus = document.getElementById('gemini-status');
                const groqHealth = document.getElementById('groq-health');
                const geminiHealth = document.getElementById('gemini-health');

                if (this.primaryProvider === 'groq' && this.isGroqHealthy) {
                    groqStatus.className = 'provider active';
                    groqHealth.textContent = 'Active (Primary)';
                    geminiStatus.className = 'provider inactive';
                    geminiHealth.textContent = 'Standby';
                } else {
                    groqStatus.className = 'provider inactive';
                    groqHealth.textContent = 'Standby';
                    geminiStatus.className = 'provider active';
                    geminiHealth.textContent = 'Active (Primary)';
                }
            }
        }

        const hybridAI = new MockHybridAI();
        
        function log(message, type = 'info') {
            const logs = document.getElementById('logs');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.innerHTML = `<strong>[${timestamp}]</strong> ${message}`;
            logEntry.style.color = type === 'error' ? '#721c24' : type === 'success' ? '#155724' : '#0c5460';
            logs.appendChild(logEntry);
            logs.scrollTop = logs.scrollHeight;
        }
        
        function updateStatus(message, type = 'info') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
        }

        function showResponse(text) {
            const response = document.getElementById('response');
            response.textContent = text;
            response.style.display = 'block';
        }

        async function testChatResponse() {
            const message = document.getElementById('messageInput').value;
            if (!message) {
                log('❌ Please enter a message', 'error');
                return;
            }

            try {
                log('🤖 Testing chat response...');
                updateStatus('Getting AI response...', 'info');
                
                const response = await hybridAI.getXitBotResponse(message);
                showResponse(response);
                log('✅ Chat response received', 'success');
                updateStatus('Response received', 'success');
                
            } catch (error) {
                log(`❌ Chat test failed: ${error.message}`, 'error');
                updateStatus('Chat test failed', 'error');
            }
        }

        async function testQuickReplies() {
            try {
                log('⚡ Testing quick replies...');
                const replies = await hybridAI.getQuickReplies("Hello there!");
                showResponse(`Quick Replies: ${replies.join(', ')}`);
                log('✅ Quick replies received', 'success');
                
            } catch (error) {
                log(`❌ Quick replies test failed: ${error.message}`, 'error');
            }
        }

        async function testBuzzFeed() {
            try {
                log('📰 Testing buzz feed...');
                const buzz = await hybridAI.getLatestBuzz();
                const buzzText = buzz.map(item => `${item.title}: ${item.snippet}`).join('\n');
                showResponse(buzzText);
                log('✅ Buzz feed received', 'success');
                
            } catch (error) {
                log(`❌ Buzz feed test failed: ${error.message}`, 'error');
            }
        }

        async function testHybridSwitch() {
            try {
                log('🔄 Testing provider switch...');
                
                const currentProvider = hybridAI.primaryProvider;
                const newProvider = currentProvider === 'groq' ? 'gemini' : 'groq';
                
                hybridAI.forceSwitchProvider(newProvider);
                
                log(`✅ Switched from ${currentProvider} to ${newProvider}`, 'success');
                updateStatus(`Switched to ${newProvider}`, 'success');
                
            } catch (error) {
                log(`❌ Provider switch failed: ${error.message}`, 'error');
            }
        }

        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
            document.getElementById('response').style.display = 'none';
            log('Logs cleared');
        }

        // Initialize
        window.addEventListener('load', async () => {
            log('Groq AI test page loaded');
            
            // Test initial health
            const groqHealthy = await hybridAI.testGroqHealth();
            hybridAI.isGroqHealthy = groqHealthy;
            hybridAI.updateProviderDisplay();
            
            if (groqHealthy) {
                log('✅ Groq AI is healthy and ready', 'success');
                updateStatus('Groq AI ready', 'success');
            } else {
                log('⚠️ Groq AI health check failed, will use Gemini', 'error');
                updateStatus('Using Gemini fallback', 'error');
            }
        });
    </script>
</body>
</html>
