<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connection Debug Test</title>
    <script src="debug-connections.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Courier New', monospace; }
        .terminal { background: #000; color: #00ff41; }
        .glow { text-shadow: 0 0 10px #00ff41; }
    </style>
</head>
<body class="bg-black text-green-400 p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-bold mb-4 glow">🔧 Connection Debug Test</h1>
        
        <div class="mb-4 p-3 border border-green-400/30">
            <h2 class="text-sm font-bold mb-2">Device Info</h2>
            <div id="deviceInfo" class="text-xs font-mono">Loading...</div>
        </div>

        <div class="mb-4 p-3 border border-green-400/30">
            <h2 class="text-sm font-bold mb-2">Test Connections</h2>
            <div class="space-y-2">
                <button onclick="testAllMethods()" class="w-full px-3 py-2 bg-green-400/20 border border-green-400 text-green-400 text-xs">
                    Test All Connection Methods
                </button>
                <button onclick="testWebSocket()" class="w-full px-3 py-2 bg-blue-400/20 border border-blue-400 text-blue-400 text-xs">
                    Test WebSocket Only
                </button>
                <button onclick="testWebRTC()" class="w-full px-3 py-2 bg-purple-400/20 border border-purple-400 text-purple-400 text-xs">
                    Test WebRTC Only
                </button>
                <button onclick="generateReport()" class="w-full px-3 py-2 bg-cyan-400/20 border border-cyan-400 text-cyan-400 text-xs">
                    Generate Diagnostic Report
                </button>
            </div>
        </div>

        <div class="mb-4 p-3 border border-green-400/30">
            <h2 class="text-sm font-bold mb-2">Connection Status</h2>
            <div id="connectionStatus" class="text-xs font-mono">Ready to test...</div>
        </div>

        <div class="mb-4 p-3 border border-green-400/30">
            <h2 class="text-sm font-bold mb-2">Debug Log</h2>
            <div id="debugLog" class="text-xs font-mono h-48 overflow-y-auto bg-black/50 p-2 border border-green-400/20"></div>
        </div>
    </div>

    <script>
        let debugger = window.connectionDebugger;
        
        // Override console.log to capture debug output
        const originalLog = console.log;
        console.log = function(...args) {
            originalLog.apply(console, args);
            const message = args.join(' ');
            addDebugLog(message);
        };

        function addDebugLog(message) {
            const logDiv = document.getElementById('debugLog');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `<div class="text-cyan-400">[${timestamp}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function updateDeviceInfo() {
            const deviceInfo = {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                vendor: navigator.vendor,
                isH60: navigator.userAgent.includes('H60'),
                isAndroid: /Android/i.test(navigator.userAgent),
                isMobile: /Mobi|Android/i.test(navigator.userAgent),
                onLine: navigator.onLine,
                webRTC: 'RTCPeerConnection' in window,
                webSocket: 'WebSocket' in window
            };

            const infoDiv = document.getElementById('deviceInfo');
            infoDiv.innerHTML = `
                <div><strong>Device:</strong> ${deviceInfo.userAgent.split(' ').slice(-2).join(' ')}</div>
                <div><strong>H60:</strong> ${deviceInfo.isH60 ? '✅' : '❌'}</div>
                <div><strong>Android:</strong> ${deviceInfo.isAndroid ? '✅' : '❌'}</div>
                <div><strong>WebRTC:</strong> ${deviceInfo.webRTC ? '✅' : '❌'}</div>
                <div><strong>WebSocket:</strong> ${deviceInfo.webSocket ? '✅' : '❌'}</div>
                <div><strong>Online:</strong> ${deviceInfo.onLine ? '✅' : '❌'}</div>
            `;
        }

        async function testAllMethods() {
            const statusDiv = document.getElementById('connectionStatus');
            statusDiv.innerHTML = 'Testing all connection methods...';
            
            const testPeer = 'test-peer-' + Date.now();
            
            // Test WebSocket
            debugger.trackConnectionAttempt(testPeer + '-ws', { name: 'Test Peer' }, 'websocket');
            const wsResult = await debugger.testConnectionMethod('websocket', testPeer + '-ws');
            
            // Test WebRTC
            debugger.trackConnectionAttempt(testPeer + '-rtc', { name: 'Test Peer' }, 'webrtc');
            const rtcResult = await debugger.testConnectionMethod('webrtc', testPeer + '-rtc');
            
            // Test Nostr
            debugger.trackConnectionAttempt(testPeer + '-nostr', { name: 'Test Peer' }, 'nostr');
            const nostrResult = await debugger.testConnectionMethod('nostr', testPeer + '-nostr');
            
            statusDiv.innerHTML = `
                <div>WebSocket: ${wsResult ? '✅' : '❌'}</div>
                <div>WebRTC: ${rtcResult ? '✅' : '❌'}</div>
                <div>Nostr: ${nostrResult ? '✅' : '❌'}</div>
            `;
        }

        async function testWebSocket() {
            const statusDiv = document.getElementById('connectionStatus');
            statusDiv.innerHTML = 'Testing WebSocket connection...';
            
            const testPeer = 'ws-test-' + Date.now();
            debugger.trackConnectionAttempt(testPeer, { name: 'WebSocket Test' }, 'websocket');
            const result = await debugger.testConnectionMethod('websocket', testPeer);
            
            statusDiv.innerHTML = `WebSocket: ${result ? '✅ Success' : '❌ Failed'}`;
        }

        async function testWebRTC() {
            const statusDiv = document.getElementById('connectionStatus');
            statusDiv.innerHTML = 'Testing WebRTC connection...';
            
            const testPeer = 'rtc-test-' + Date.now();
            debugger.trackConnectionAttempt(testPeer, { name: 'WebRTC Test' }, 'webrtc');
            const result = await debugger.testConnectionMethod('webrtc', testPeer);
            
            statusDiv.innerHTML = `WebRTC: ${result ? '✅ Success' : '❌ Failed'}`;
        }

        function generateReport() {
            const report = debugger.generateReport();
            const statusDiv = document.getElementById('connectionStatus');
            
            statusDiv.innerHTML = `
                <div><strong>Diagnostic Report:</strong></div>
                <div>Total Attempts: ${report.totalAttempts}</div>
                <div>Successes: ${report.successes}</div>
                <div>Failures: ${report.failures}</div>
                <div>Success Rate: ${report.successRate.toFixed(1)}%</div>
                <div class="mt-2"><strong>Recommendations:</strong></div>
                ${report.recommendations.map(rec => `<div class="text-yellow-400">• ${rec}</div>`).join('')}
            `;
        }

        // Initialize on load
        window.addEventListener('load', () => {
            updateDeviceInfo();
            addDebugLog('🔧 Connection Debugger Loaded');
            
            // Auto-test after 2 seconds
            setTimeout(() => {
                addDebugLog('🧪 Starting automatic connection tests...');
                testAllMethods();
            }, 2000);
        });
    </script>
</body>
</html>
