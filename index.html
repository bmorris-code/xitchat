<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <!-- FIX 1: Prevent Caching on iOS/Android -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- FIX 2: Security Policy -->
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://vite.dev; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https: wss: ws:; media-src 'self' blob: data:; worker-src 'self' blob:; manifest-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none';">
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <title>XitChat</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <link rel="alternate icon" type="image/png" sizes="32x32" href="/icon-96.png">

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" crossorigin="use-credentials">
    <meta name="theme-color" content="#00ff41">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="XitChat">
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png">

    <!-- iOS PWA Fixes -->
    <meta name="apple-touch-fullscreen" content="yes">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Assets -->
    <link rel="stylesheet" href="/font-awesome/css/all.min.css">

    <!-- Preconnect for faster font load; <link> allows Workbox to cache the stylesheet -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap">

    <style>
        /* Essential base styles only, rest in index.css */

        html,
        body,
        #root {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            background-color: #020202;
            overflow: hidden;
            font-family: 'JetBrains Mono', monospace;
        }

        .terminal-btn {
            background: transparent;
            border: 1px solid var(--neon-color, #00ff41);
            padding: 4px 12px;
            font-size: 14px;
            color: var(--neon-color, #00ff41);
            transition: all 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 36px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .terminal-btn:active {
            background: var(--neon-color, #00ff41);
            color: #020202;
        }

        .terminal-btn.active {
            background: var(--neon-color, #00ff41);
            color: #020202;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.4);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="theme-green crt">
    <div id="root"></div>
    <script src="/bootstrap.js"></script>
    <script type="module" src="/index.tsx"></script>
    <script>
      // Vite dev server fallback
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        const script = document.createElement('script');
        script.type = 'module';
        script.src = '/@vite/client';
        document.head.appendChild(script);
      }
    </script>
</body>

</html>
