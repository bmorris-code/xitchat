<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- FIX 1: Prevent Caching on iOS/Android (Forces app to load new files) -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- FIX 2: Security Policy (Allows Websockets for Chat & Images) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data: gap: ws: wss: blob: filesystem:;">

    <script>
        // CRITICAL POLYFILLS for Mobile/PWA
        window.global = window;
        window.process = window.process || { env: { NODE_ENV: 'production' }, version: '' };

        // Error Logging
        window.onerror = function(msg, url, line, col, error) {
            console.error("Global Error:", msg, "at", line, ":", col);
        };
        window.addEventListener('unhandledrejection', function(event) {
            console.warn("Unhandled Promise Rejection:", event.reason);
        });
    </script>

    <title>XitChat</title>
    <!-- Local Font Awesome to avoid tracking prevention -->
    <link rel="stylesheet" href="/font-awesome/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');
        
        :root {
            --neon-color: #00ff41;
            --neon-glow: rgba(0, 255, 65, 0.4);
            --terminal-black: #020202; 
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --safe-left: env(safe-area-inset-left);
            --safe-right: env(safe-area-inset-right);
        }

        html, body {
            height: 100%; width: 100%; overflow-x: hidden;
            -webkit-text-size-adjust: 100%; -webkit-tap-highlight-color: transparent;
        }

        .safe-area-padding {
            padding-top: var(--safe-top, 0);
            padding-bottom: var(--safe-bottom, 0);
            padding-left: var(--safe-left, 0);
            padding-right: var(--safe-right, 0);
        }

        /* Theme Variations */
        body.theme-amber { --neon-color: #ffb000; --neon-glow: rgba(255, 176, 0, 0.4); }
        body.theme-cyan { --neon-color: #00ffff; --neon-glow: rgba(0, 255, 255, 0.4); }
        body.theme-red { --neon-color: #ff3131; --neon-glow: rgba(255, 49, 49, 0.4); }

        body {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            background-color: var(--terminal-black);
            color: var(--neon-color);
            overflow-x: hidden;
            text-transform: lowercase;
            margin: 0; padding: 0;
            min-height: 100%; width: 100%;
        }

        #root { min-height: 100vh; display: flex; flex-direction: column; background-color: var(--terminal-black); }

        .terminal-btn {
            background: transparent; border: 1px solid var(--neon-color);
            padding: 4px 12px; font-size: 14px; color: var(--neon-color);
            transition: all 0.2s; cursor: pointer; display: flex;
            align-items: center; justify-content: center; min-height: 36px;
        }

        .terminal-btn:active { background: var(--neon-color); color: var(--terminal-black); }
        .terminal-btn.active {
            background: var(--neon-color); color: var(--terminal-black);
            box-shadow: 0 0 10px var(--neon-glow);
        }

        .scanline {
            width: 100%; height: 100px; z-index: 99;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, var(--neon-glow) 5%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.03; position: absolute; bottom: 100%; pointer-events: none;
            animation: scanline 10s linear infinite;
        }
        @keyframes scanline { 0% { bottom: 100%; } 100% { bottom: -100px; } }

        .glow-text { text-shadow: 0 0 4px var(--neon-glow); }
        .border-neon { border-color: var(--neon-color); }
        .text-neon { color: var(--neon-color); }

        input[type="text"] { font-size: 16px !important; color: white !important; }
        .pt-safe { padding-top: var(--safe-top); }
        .pb-safe { padding-bottom: var(--safe-bottom); }

        /* CRT Filter Overlays */
        .crt::before {
            content: " "; display: block; position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 2; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        .crt::after {
          content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
          background: rgba(18, 16, 16, 0.05); opacity: 0; z-index: 2; pointer-events: none;
          animation: flicker 0.2s infinite;
        }
        @keyframes flicker { 0% { opacity: 0.1; } 100% { opacity: 0.15; } }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00ff41">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="XitChat">
</head>
<body class="theme-green crt">
    <div class="scanline"></div>
    <div id="root"></div>
    
    <script>
        // FIX 3: Detect if running in Capacitor (Native App) vs Browser
        const isApp = window.Capacitor !== undefined; 

        // ONLY register Service Worker if on the Web (PWA)
        // This prevents the Native App from trying to cache files incorrectly
        if ('serviceWorker' in navigator && !isApp) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((registration) => {
                        console.log('PWA: Service Worker registered (Web Mode)');
                    })
                    .catch((error) => {
                        console.log('PWA: Registration failed:', error);
                    });
            });
        } else if (isApp) {
            console.log('Native App Detected: Service Worker disabled to prevent conflicts');
        }

        // Fix for iOS blank screen
        document.addEventListener('DOMContentLoaded', function() {
            if (/(iPad|iPhone|iPod)/g.test(navigator.userAgent)) {
                document.body.style.display = 'none';
                setTimeout(function() {
                    document.body.style.display = 'block';
                }, 0);
            }
            document.documentElement.style.webkitTextSizeAdjust = '100%';
            document.documentElement.style.webkitFontSmoothing = 'antialiased';
        });

        // Handle resize events
        let resizeTimer;
        window.addEventListener('resize', function() {
            document.body.classList.add('resize-animation-stopper');
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                document.body.classList.remove('resize-animation-stopper');
            }, 400);
        });
    </script>
    
    <script type="module" src="./index.tsx"></script>
</body>
</html>
