<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <!-- FIX 1: Prevent Caching on iOS/Android (Forces app to load new files) -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- FIX 2: Security Policy (Allows Websockets for Chat & Images) -->
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https: wss: ws:; media-src 'self' blob: data:; worker-src 'self' blob:; manifest-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none';">
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <title>XitChat</title>
    <!-- Favicon for browsers -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <link rel="alternate icon" type="image/png" sizes="32x32" href="/icon-96.png">
    <link rel="alternate icon" type="image/png" sizes="16x16" href="/icon-96.png">

    <!-- Mobile PWA icons (from manifest.json) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png">
    <link rel="shortcut icon" href="/icon-96.png">

    <!-- Local Font Awesome to avoid tracking prevention -->
    <link rel="stylesheet" href="/font-awesome/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');

        :root {
            --neon-color: #00ff41;
            --neon-glow: rgba(0, 255, 65, 0.4);
            --terminal-black: #020202;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --safe-left: env(safe-area-inset-left);
            --safe-right: env(safe-area-inset-right);
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        .safe-area-padding {
            padding-top: var(--safe-top, 0);
            padding-bottom: var(--safe-bottom, 0);
            padding-left: var(--safe-left, 0);
            padding-right: var(--safe-right, 0);
        }

        /* Theme Variations */
        body.theme-amber {
            --neon-color: #ffb000;
            --neon-glow: rgba(255, 176, 0, 0.4);
        }

        body.theme-cyan {
            --neon-color: #00ffff;
            --neon-glow: rgba(0, 255, 255, 0.4);
        }

        body.theme-red {
            --neon-color: #ff3131;
            --neon-glow: rgba(255, 49, 49, 0.4);
        }

        body {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            background-color: var(--terminal-black);
            color: var(--neon-color);
            overflow-x: hidden;
            text-transform: lowercase;
            margin: 0;
            padding: 0;
            min-height: 100%;
            width: 100%;
        }

        #root {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: var(--terminal-black);
        }

        .terminal-btn {
            background: transparent;
            border: 1px solid var(--neon-color);
            padding: 4px 12px;
            font-size: 14px;
            color: var(--neon-color);
            transition: all 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 36px;
        }

        .terminal-btn:active {
            background: var(--neon-color);
            color: var(--terminal-black);
        }

        .terminal-btn.active {
            background: var(--neon-color);
            color: var(--terminal-black);
            box-shadow: 0 0 10px var(--neon-glow);
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 99;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, var(--neon-glow) 5%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.03;
            position: absolute;
            bottom: 100%;
            pointer-events: none;
            animation: scanline 10s linear infinite;
        }

        @keyframes scanline {
            0% {
                bottom: 100%;
            }

            100% {
                bottom: -100px;
            }
        }

        .glow-text {
            text-shadow: 0 0 4px var(--neon-glow);
        }

        .border-neon {
            border-color: var(--neon-color);
        }

        .text-neon {
            color: var(--neon-color);
        }

        input[type="text"] {
            font-size: 16px !important;
            color: white !important;
        }

        .pt-safe {
            padding-top: var(--safe-top);
        }

        .pb-safe {
            padding-bottom: var(--safe-bottom);
        }

        /* CRT Filter Overlays */
        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 2;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        .crt::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: rgba(18, 16, 16, 0.05);
            opacity: 0;
            z-index: 2;
            pointer-events: none;
            animation: flicker 0.2s infinite;
        }

        @keyframes flicker {
            0% {
                opacity: 0.1;
            }

            100% {
                opacity: 0.15;
            }
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>

    <link rel="manifest" href="/manifest.json" crossorigin="use-credentials">
    <meta name="theme-color" content="#00ff41">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="XitChat">
</head>

<body class="theme-green crt">
    <div class="scanline"></div>
    <div id="root"></div>

    <script src="/bootstrap.js"></script>

    <script type="module" src="./index.tsx"></script>
    <!-- Add these after your existing apple-mobile-web-app meta tags -->
</body>

</html>
